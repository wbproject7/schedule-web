services:
  - type: web
    name: shiftmaker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        sync: false  # Supabase PostgreSQL 연결 문자열 (대시보드에서 수동 입력)
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "true"
